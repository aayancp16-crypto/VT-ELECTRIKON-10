<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VT Electrikon - Buy Multispan & Sibass Electric products online in India. Affordable prices, fast delivery, and real-time stock updates.">
    <meta name="keywords" content="VT Electrikon, Multispan, Sibass Electric, electronics store India, buy electrical products online">
    <meta name="author" content="VT Electrikon">
    <title>VT Electrikon - Electronics Store</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>VT Electrikon</h1>
        <p>Your trusted store for Multispan & Sibass Electric products</p>
    </header>

    <main>
        <div class="products">
            {% for p in products %}
            <div class="product">
                <img src="{{ url_for('static', filename=p[5]) }}" alt="{{ p[1] }}">
                <h3>{{ p[1] }} ({{ p[2] }})</h3>
                <p>₹{{ p[3] }}</p>
                {% if p[4] > 0 %}
                    <a href="/buy/{{ p[0] }}" class="btn">Add to Cart</a>
                {% else %}
                    <span class="out">Out of Stock</span>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </main>

    <footer>
        <p>© 2026 VT Electrikon | All Rights Reserved</p>
    </footer>
</body>
</html>
